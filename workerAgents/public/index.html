<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Console</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Generic Worker Control Plane · <span id="buildVersion"></span></p>
          <h1>Agent Console</h1>
        </div>
        <div class="system-pill" id="connectionState">Connecting</div>
      </header>

      <section class="auth-strip" id="authPanel">
        <div>
          <p class="eyebrow">9Router</p>
          <h2 id="authTitle">Provider dashboard</h2>
          <p class="muted" id="authDetail">Optional provider dashboard for workers that use 9Router.</p>
        </div>
        <div class="actions">
          <a class="button primary" id="providersLink" href="http://localhost:20127/dashboard/providers" target="_blank" rel="noreferrer">Providers</a>
        </div>
      </section>

      <section class="auth-strip" id="skillsPanel">
        <div>
          <p class="eyebrow">Skills</p>
          <h2>Worker Skills</h2>
          <p class="muted" id="skillsDetail">Optional helper sync for worker environments.</p>
        </div>
        <div class="actions">
          <button class="button primary" id="updateSkillsBtn" type="button">Update Skills</button>
        </div>
      </section>

      <section class="agent-grid" id="agentGrid" aria-live="polite"></section>

      <section class="log-panel">
        <div class="log-header">
          <div>
            <p class="eyebrow">Runtime Output</p>
            <h2 id="logTitle">No agent selected</h2>
          </div>
          <select id="logSelect" aria-label="Select log stream"></select>
        </div>
        <pre id="logOutput"></pre>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
