name: 🖥️ SSH Runner (10 min idle)

on:
  workflow_dispatch:

jobs:
  ssh-session:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup tmate SSH session
        uses: mxschmitt/action-tmate@v3

      - name: Keep runner alive for 10 minutes
        run: |
          echo "=== SSH connection details printed above ==="
          echo "The tmate SSH link appears in the 'Setup tmate SSH session' step logs."
          sleep 600
          echo "10 minutes elapsed. Shutting down."
