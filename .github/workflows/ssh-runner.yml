name: 🖥️ SSH Runner (10 min idle)

on:
  workflow_dispatch:
    inputs:
      ssh_port:
        description: 'Public port for SSH tunnel (2222, 3333, 4444, etc.)'
        required: true
        default: '2222'
        type: string

jobs:
  ssh-session:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: mxschmitt/action-tmate@v3
        timeout-minutes: 2

      - name: Keep alive for 10 min
        run: sleep 600
