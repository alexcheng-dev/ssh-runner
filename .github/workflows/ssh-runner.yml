name: 🖥️ SSH Runner (6 hour idle)

on:
  workflow_dispatch:

jobs:
  ssh-session:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - name: Download and install tmate
        run: |
          curl -sL "https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz" | tar xJ --strip-components=1 -C /tmp/
          sudo mv /tmp/tmate /usr/local/bin/

      - name: Generate SSH key and start tmate
        id: tmate
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready
          SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          WEB_URL=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}')
          echo "ssh-cmd=$SSH_CMD" >> "$GITHUB_OUTPUT"
          echo "web-url=$WEB_URL" >> "$GITHUB_OUTPUT"
          echo "$SSH_CMD" > /tmp/ssh-link.txt
          echo "$WEB_URL" >> /tmp/ssh-link.txt
          echo "============================================"
          echo "  SSH CONNECTION"
          echo "============================================"
          echo "SSH: $SSH_CMD"
          echo "Web: $WEB_URL"
          echo "============================================"

      - name: Upload SSH link as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-link
          path: /tmp/ssh-link.txt
          if-no-files-found: error

      - name: Keep alive 6 hours
        run: |
          echo "Runner alive for 6 hours..."
          sleep 21600

      - name: Cleanup
        if: always()
        run: |
          tmate -S /tmp/tmate.sock kill-session 2>/dev/null || true
