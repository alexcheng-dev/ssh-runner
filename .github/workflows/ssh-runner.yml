name: 🖥️ SSH Runner (10 min idle)

on:
  workflow_dispatch:
    inputs:
      ssh_public_key:
        description: 'Your SSH public key (paste the full line from ~/.ssh/id_*.pub)'
        required: true
        type: string

jobs:
  ssh-session:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup tmate SSH session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          ssh-public-keys: ${{ inputs.ssh_public_key }}

      - name: Keep runner alive for 10 minutes
        run: |
          echo "=== SSH connection details printed above ==="
          echo "The tmate SSH link appears in the 'Setup tmate SSH session' step logs."
          sleep 600
          echo "10 minutes elapsed. Shutting down."
